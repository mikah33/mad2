<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="carGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Car body -->
  <path d="M 12 32 L 16 24 L 24 20 L 40 20 L 48 24 L 52 32 L 52 42 L 12 42 Z"
        fill="url(#carGradient)" stroke="#1f2937" stroke-width="1.5"/>

  <!-- Windshield -->
  <path d="M 24 24 L 28 24 L 28 28 L 24 30 Z" fill="#60a5fa" opacity="0.7"/>

  <!-- Window -->
  <path d="M 36 24 L 40 24 L 42 30 L 36 30 Z" fill="#60a5fa" opacity="0.7"/>

  <!-- Front wheel -->
  <circle cx="20" cy="42" r="6" fill="#1f2937"/>
  <circle cx="20" cy="42" r="3" fill="#6b7280"/>

  <!-- Back wheel -->
  <circle cx="44" cy="42" r="6" fill="#1f2937"/>
  <circle cx="44" cy="42" r="3" fill="#6b7280"/>

  <!-- Headlight -->
  <circle cx="52" cy="32" r="2" fill="#fef08a"/>

  <!-- Detail lines -->
  <line x1="28" y1="28" x2="36" y2="28" stroke="#1f2937" stroke-width="1"/>
</svg>
