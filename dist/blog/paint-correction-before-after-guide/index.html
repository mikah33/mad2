  "mainEntity": [

      "@type": "Question",
      "name": "How long does paint correction last?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Paint correction is permanent—the defects removed don't return. However, new damage can occur from improper washing, environmental factors, or automated car washes. With proper maintenance and protection (ceramic coating or regular wax), paint correction results can look perfect for 3-5+ years."
      }
    },
    {
      "@type": "Question",
      "name": "Can paint correction remove all scratches?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Paint correction removes scratches within the clear coat layer. Deep scratches that penetrate through clear coat to base coat or primer cannot be removed by polishing and require touch-up paint or repainting. About 85-95% of common scratches and swirl marks can be eliminated through professional correction."
      }
    },
    {
      "@type": "Question",
      "name": "How long does paint correction take in Columbia, SC?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Single-stage correction takes 4-8 hours, two-stage correction 8-16 hours, and multi-stage show-quality correction 16-40+ hours. Time varies based on vehicle size, paint condition, and desired results. Most Columbia vehicles receive two-stage correction completed in 1-2 days."
      }
    },
    {
      "@type": "Question",
      "name": "Is paint correction safe for my car's paint?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes, when performed by trained professionals. We measure paint thickness before starting to ensure sufficient clear coat for safe polishing. Professional correction removes only 0.1-0.5 mils of clear coat, leaving plenty of protection. Factory clear coat is 1.5-2.5 mils thick, allowing multiple corrections over vehicle's lifetime."
      }
    },
    {
      "@type": "Question",
      "name": "Should I get ceramic coating after paint correction?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Absolutely. Paint correction leaves paint unprotected and vulnerable. Ceramic coating is highly recommended because it preserves correction results for years, adds UV protection crucial for South Carolina, and makes maintenance easier. The combination provides best long-term value for your investment."
      }
    },
    {
      "@type": "Question",
      "name": "How much does paint correction cost in Columbia, SC?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Single-stage correction costs $300-500, two-stage correction $600-1,200, and multi-stage show-quality correction $1,200-3,000+. Price varies by vehicle size, paint condition, and services included. Most Columbia vehicles benefit from two-stage correction at $600-1,200, often bundled with ceramic coating."
      }
    },

      "@type": "Question",
      "name": "Can I do paint correction myself?",
      "acceptedAnswer": {
        "@type": "Answer",
