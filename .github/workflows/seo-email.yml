name: SEO Weekly Email
on:
  issues:
    types: [opened, labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to email (for manual testing of an existing issue)'
        required: true
        type: number

permissions:
  contents: read
  issues: read

jobs:
  send-email:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (contains(github.event.issue.labels.*.name, 'seo') && contains(github.event.issue.labels.*.name, 'weekly'))
    runs-on: ubuntu-latest
    steps:
      - name: Fetch issue
        id: issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            NUM="${{ inputs.issue_number }}"
          else
            NUM="${{ github.event.issue.number }}"
          fi
          gh issue view "$NUM" -R "${{ github.repository }}" --json title,body,number,url > issue.json
          echo "number=$NUM" >> "$GITHUB_OUTPUT"

      - name: Send email via Migadu SMTP
        env:
          MIGADU_HOST: ${{ secrets.MIGADU_HOST }}
          MIGADU_PORT: ${{ secrets.MIGADU_PORT }}
          MIGADU_USER: ${{ secrets.MIGADU_USER }}
          MIGADU_PASS: ${{ secrets.MIGADU_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          REPO: ${{ github.repository }}
        run: |
          python3 -m pip install --quiet markdown
          python3 <<'PYEOF'
          import json, os, smtplib, ssl
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          import markdown as md

          with open("issue.json") as f:
              issue = json.load(f)

          title = issue["title"]
          body_md = issue["body"] or ""
          url = issue["url"]
          number = issue["number"]
          repo = os.environ["REPO"]

          html_body = md.markdown(body_md, extensions=["tables", "fenced_code", "nl2br"])

          html = f"""<!DOCTYPE html>
          <html><head><meta charset="utf-8">
          <style>
            body {{ font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                    max-width: 720px; margin: 0 auto; padding: 24px; color: #1a1a1a;
                    background: #ffffff; line-height: 1.5; }}
            h1 {{ color: #0d1b2a; font-size: 22px; margin-top: 0; }}
            h2 {{ color: #0d1b2a; font-size: 17px; border-bottom: 1px solid #e0e0e0;
                  padding-bottom: 4px; margin-top: 28px; }}
            h3 {{ color: #0d1b2a; font-size: 15px; margin-top: 20px; }}
            table {{ border-collapse: collapse; width: 100%; margin: 12px 0; }}
            th, td {{ border: 1px solid #e0e0e0; padding: 8px 12px; text-align: left;
                      font-size: 14px; vertical-align: top; }}
            th {{ background: #f5f5f5; font-weight: 600; }}
            a {{ color: #1e6091; }}
            code {{ background: #f5f5f5; padding: 2px 6px; border-radius: 3px;
                    font-size: 13px; font-family: ui-monospace, 'SF Mono', monospace; }}
            hr {{ border: none; border-top: 1px solid #e0e0e0; margin: 24px 0; }}
            .header {{ background: #f8f9fa; padding: 14px 16px; border-radius: 6px;
                       margin-bottom: 24px; font-size: 13px; color: #555; }}
            .footer {{ color: #888; font-size: 12px; margin-top: 32px;
                       padding-top: 16px; border-top: 1px solid #e0e0e0; }}
            blockquote {{ border-left: 3px solid #1e6091; margin: 10px 0;
                          padding: 4px 14px; color: #555; background: #f8f9fa; }}
          </style></head><body>
            <div class="header">
              <strong>Repo:</strong> <a href="https://github.com/{repo}">{repo}</a> &middot;
              <strong>Issue:</strong> <a href="{url}">#{number}</a>
            </div>
            <h1>{title}</h1>
            {html_body}
            <div class="footer">
              Sent by the weekly SEO automation. <a href="{url}">View on GitHub</a>.
            </div>
          </body></html>"""

          msg = MIMEMultipart("alternative")
          msg["Subject"] = title
          msg["From"] = os.environ["EMAIL_FROM"]
          msg["To"] = os.environ["EMAIL_TO"]
          msg.attach(MIMEText(body_md, "plain", "utf-8"))
          msg.attach(MIMEText(html, "html", "utf-8"))

          port = int(os.environ["MIGADU_PORT"])
          ctx = ssl.create_default_context()
          if port == 465:
              with smtplib.SMTP_SSL(os.environ["MIGADU_HOST"], port, context=ctx) as s:
                  s.login(os.environ["MIGADU_USER"], os.environ["MIGADU_PASS"])
                  s.send_message(msg)
          else:
              with smtplib.SMTP(os.environ["MIGADU_HOST"], port) as s:
                  s.starttls(context=ctx)
                  s.login(os.environ["MIGADU_USER"], os.environ["MIGADU_PASS"])
                  s.send_message(msg)

          print(f"OK sent '{title}' to {os.environ['EMAIL_TO']}")
          PYEOF
