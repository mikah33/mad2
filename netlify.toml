[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Canonical: collapse /locations/west-columbia-sc and all children → /locations/west-columbia
[[redirects]]
  from = "/locations/west-columbia-sc"
  to = "/locations/west-columbia"
  status = 301
  force = true

[[redirects]]
  from = "/locations/west-columbia-sc/*"
  to = "/locations/west-columbia/:splat"
  status = 301
  force = true

# SPA fallback (must be last)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
